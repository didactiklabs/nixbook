name: npins update
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
permissions:
  contents: "write"
  pull-requests: "write"
jobs:
  get-pins:
    runs-on: ubuntu-latest
    outputs:
      pins: ${{ steps.set-pins.outputs.pins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: set-pins
        run: |
          PINS=$(jq -c '.pins | keys' npins/sources.json)
          echo "pins=$PINS" >> "$GITHUB_OUTPUT"
  npins-update:
    needs: get-pins
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pin: ${{ fromJson(needs.get-pins.outputs.pins) }}
      fail-fast: false
      max-parallel: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - name: Get Nixpkgs revision
        run: |
          url=$(jq -r .pins.nixpkgs.url npins/sources.json)
          echo "url=$url" >> "$GITHUB_ENV"
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=${{ env.url }}
          extra_nix_config: |
            fallback = true
            trusted-public-keys = didactiklabs-nixcache:PxLKN0+ZkP07M8g8/B6xbP6A4MYpqQg6LH7V3muiy/0= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://s3.didactiklabs.io/nix-cache https://cache.nixos.org/
      - name: Update npins
        run: nix run nixpkgs#npins -- update ${{ matrix.pin }}
      - name: Sync devenv.yaml nixpkgs revision
        if: matrix.pin == 'nixpkgs'
        run: |
          REV=$(jq -r '.pins.nixpkgs.revision' npins/sources.json)
          sed -i "s|url: github:NixOS/nixpkgs/.*|url: github:NixOS/nixpkgs/${REV}|" devenv.yaml
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(deps): update ${{ matrix.pin }}"
          title: "chore(deps): update ${{ matrix.pin }}"
          body: "This PR updates the pinned source `${{ matrix.pin }}` using `npins update ${{ matrix.pin }}`."
          branch: "npins-update-${{ matrix.pin }}"
          delete-branch: true
      - name: Assign all org members as reviewers
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          MEMBERS=$(gh api orgs/didactiklabs/members --jq '[.[].login]' --paginate)
          if [ "$MEMBERS" = "[]" ] || [ -z "$MEMBERS" ]; then
            echo "No org members found, skipping reviewer assignment"
            exit 0
          fi
          jq -n --argjson members "$MEMBERS" '{"reviewers": $members}' | \
            gh api "repos/${{ github.repository }}/pulls/${{ steps.cpr.outputs.pull-request-number }}/requested_reviewers" \
              --method POST \
              --input -
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: rebase
