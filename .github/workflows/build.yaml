name: Build Profiles
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  pre_job:
    # continue-on-error: true # Uncomment once integration is finished
    runs-on: self-hosted
    # Map a step output to a job output
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master
        with:
          # All of these options are optional, so you can remove them if you are happy with the defaults
          concurrent_skipping: "never"
          skip_after_successful_duplicate: "true"
          paths_ignore: '["**/README.md", "**/docs/**"]'
          do_not_skip: '["pull_request", "workflow_dispatch", "schedule"]'
  build:
    timeout-minutes: 120
    needs: pre_job
    if: ${{ needs.pre_job.outputs.should_skip != 'true' }}
    runs-on: self-hosted
    strategy:
      # Don't cancel the other profiles when one runner hiccups (e.g. a runner
      # shutdown signal or a transient "SQLite database is busy" lock race on the
      # shared self-hosted Nix store). Each profile's build is independent.
      fail-fast: false
      max-parallel: 3
      matrix:
        profile:
          - totoro
          - anya
          - nishinoya
          - tanjiro
          - hanamichi
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get Nixpkgs revision for nixfmt
        run: |
          # This should not be a URL, because it would allow PRs to run arbitrary code in CI!
          url=$(jq -r .pins.nixpkgs.url npins/sources.json)
          echo "url=$url" >> "$GITHUB_ENV"
      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=${{ env.url }}
          extra_nix_config: |
            fallback = true
            trusted-public-keys = didactiklabs-nixcache:PxLKN0+ZkP07M8g8/B6xbP6A4MYpqQg6LH7V3muiy/0= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://s3.didactiklabs.io/nix-cache https://cache.nixos.org/
      - name: Auth to s3 cache
        run: |
          aws --profile default configure set aws_access_key_id "${{ secrets.AWS_ACCESS_KEY_ID }}"
          aws --profile default configure set aws_secret_access_key "${{ secrets.AWS_SECRET_ACCESS_KEY_ID }}"
      - name: Build (${{ matrix.profile }})
        run: |
          export NIXPKGS_ALLOW_UNFREE=1
          build=$(nix-shell -p colmena --run "colmena build --on '${{ matrix.profile }}' --no-build-on-target" 2>&1 | tee /dev/stderr | grep -oE '/nix/store/[a-z0-9]+-nixos-system-[^ "]+' | tail -n1)
          echo "build=$build" >> "$GITHUB_ENV"
      - name: Push to cache (${{ matrix.profile }})
        if: success()
        continue-on-error: true
        run: |
          echo '${{ secrets.CACHE_PRIVATE_KEY }}' > cache-priv.pem
          nix store sign -r -k cache-priv.pem "$build"
          nix copy --option http-connections 1 --to 's3://nix-cache?profile=default&scheme=https&endpoint=s3.didactiklabs.io' "$build"
